name: Generated APK AAB (Upload - Create Artifact To Github Action)

env:
  main_project_module: android/app
  playstore_name: Expense Tracker

permissions:
  contents: write

on:
  push:
    branches: ["**"]
    paths:
      - ".github/workflows/**"
      - "android/app/**"
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/**"
      - "android/app/**"
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip version bump]') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set current date as env variable
        run: echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Set repository name as env variable
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Bump app version on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          current_version_code=$(grep -oE 'versionCode = [0-9]+' android/app/build.gradle.kts | awk '{print $3}')
          current_version_name=$(grep -oE 'versionName = "[^"]+"' android/app/build.gradle.kts | sed -E 's/versionName = "([^"]+)"/\1/')

          IFS='.' read -r major minor patch <<< "$current_version_name"
          major=${major:-1}
          minor=${minor:-0}
          new_version_code=$((current_version_code + 1))
          new_minor=$((minor + 1))

          if [ -n "${patch:-}" ]; then
            new_version_name="${major}.${new_minor}.0"
          else
            new_version_name="${major}.${new_minor}"
          fi

          perl -0pi -e 's/versionCode = \d+/versionCode = '"$new_version_code"'/; s/versionName = "[^"]+"/versionName = "'"$new_version_name"'"/' android/app/build.gradle.kts

          echo "app_version_code=$new_version_code" >> $GITHUB_ENV
          echo "app_version_name=$new_version_name" >> $GITHUB_ENV
          echo "release_tag=v${new_version_name}" >> $GITHUB_ENV

      - name: Commit and push version bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/app/build.gradle.kts
          git commit -m "ci: bump app version to ${app_version_name} [skip version bump]"
          git push origin HEAD:${GITHUB_REF#refs/heads/}

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      - name: Create local.properties
        run: |
          cat > android/local.properties <<'EOF'
          AUTH_BASE_URL=${{ secrets.AUTH_BASE_URL }}
          AUTH_AUTHORIZE_PATH=${{ secrets.AUTH_AUTHORIZE_PATH }}
          AUTH_TOKEN_PATH=${{ secrets.AUTH_TOKEN_PATH }}
          AUTH_CLIENT_ID=${{ secrets.AUTH_CLIENT_ID }}
          AUTH_RESOURCE=${{ secrets.AUTH_RESOURCE }}
          AUTH_REDIRECT_URI=${{ secrets.AUTH_REDIRECT_URI }}
          KEYSTORE_FILE=keystore.jks
          STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF
      - name: Set Up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x android/gradlew

      - name: Run gradle tests
        run: android/gradlew -p android test

      - name: Build gradle project
        run: android/gradlew -p android build

      - name: Build APK debug
        run: android/gradlew -p android assembleDebug

      - name: Build APK release
        run: android/gradlew -p android assemble

      - name: Build AAB release
        run: android/gradlew -p android app:bundleRelease

      - name: Upload APK Debug
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }} - ${{ env.playstore_name }} - ${{ env.repository_name }} - APK(s) debug generated
          path: android/app/build/outputs/apk/debug/

      - name: Upload APK Release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }} - ${{ env.playstore_name }} - ${{ env.repository_name }} - APK(s) release generated
          path: android/app/build/outputs/apk/release/

      - name: Upload AAB Release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.date_today }} - ${{ env.playstore_name }} - ${{ env.repository_name }} - App bundle(s) AAB release generated
          path: android/app/build/outputs/bundle/release/

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${release_tag}" \
            android/app/build/outputs/apk/release/*.apk \
            android/app/build/outputs/bundle/release/*.aab \
            --target "$(git rev-parse HEAD)" \
            --title "${playstore_name} ${release_tag}" \
            --notes "Automated release for version ${app_version_name} (versionCode ${app_version_code})."
